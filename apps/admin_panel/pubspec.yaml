name: admin_panel
description: Uppibrasil Admin Panel
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_common:
    path: ../../libs/flutter_common
  google_fonts: ^6.1.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  image_picker: ^1.2.1
  camera: ^0.11.0
  url_launcher: ^6.3.2
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^5.1.0
  fl_chart: ^1.2.0
  pdf: ^3.10.8


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.staging
    - assets/images/
