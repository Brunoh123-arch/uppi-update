name: uppi_motorista
description: Uppi Motorista — Gerencie suas corridas e ganhos
publish_to: "none"

version: 3.0.2+3

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ^3.27.0

dependencies:
  sentry_flutter: ^9.20.0
  flutter:
    sdk: flutter

  freezed_annotation: ^2.4.4

  # Geo
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  flutter_bloc: ^8.1.5
  hydrated_bloc: ^9.1.5

  # Dependency injection
  get_it: ^8.0.2
  injectable: ^2.4.1

  # Routing
  auto_route: ^9.2.2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.3

  # Helpers
  dartz: ^0.10.1
  rxdart: ^0.28.0
  equatable: ^2.0.3
  path_provider: ^2.1.5
  json_annotation: ^4.8.1
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.0
  flutter_ringtone_player: ^4.0.0+3

  # Firebase — SOMENTE free-tier (Auth + FCM)
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  supabase_flutter: ^2.12.4
  safe_device: ^1.1.4
  flutter_tts: ^4.1.0

  # UI
  ionicons: 0.2.2
  flutter_rating_bar: ^4.0.1
  fl_chart: ^0.64.0
  dotted_border: ^2.1.0
  generic_map:
    path: ../../libs/generic_map
  flutter_common:
    path: ../../libs/flutter_common
  lottie: ^3.2.0

  # Network
  cached_network_image: ^3.4.1
  collection: ^1.17.2
  dotted_line: ^3.2.3
  gauge_indicator: ^0.4.3
  map_launcher: ^3.5.0
  share_plus: ^10.1.2
  location: ^7.0.1
  package_info_plus: ^8.1.1
  maps_toolkit: ^3.0.0
  wakelock_plus: ^1.2.8
  local_auth: ^3.0.1
  camera: ^0.11.0
  flutter_image_compress: ^2.4.0
  flutter_local_notifications: ^18.0.1

  google_sign_in: ^7.2.0
  http: ^1.6.0
  permission_handler: ^12.0.1
  flutter_compass: ^0.8.1
  image_picker: ^1.1.2

dev_dependencies:
  bloc_test: any
  mocktail: ^1.0.3
  sentry_dart_plugin: ^2.4.1
  auto_route_generator: any
  build_runner: ^2.4.13
  build_web_compilers: ^4.0.11
  flutter_gen_runner: ^5.8.0
  flutter_gen: ^5.8.0
  flutter_lints: ^5.0.0
  injectable_generator: ^2.6.2
  build_verify: ^3.1.0
  freezed: any
  json_serializable: 6.7.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/avatars/
    - assets/lottie/
    - assets/notification.mp3

  fonts:
    - family: GeneralSans
      fonts:
        - asset: packages/flutter_common/assets/fonts/generalsansextralight.ttf
          weight: 200
        - asset: packages/flutter_common/assets/fonts/generalsanslight.ttf
          weight: 300
        - asset: packages/flutter_common/assets/fonts/generalsansregular.ttf
          weight: 400
        - asset: packages/flutter_common/assets/fonts/generalsansmedium.ttf
          weight: 500
        - asset: packages/flutter_common/assets/fonts/generalsanssemibold.ttf
          weight: 600
        - asset: packages/flutter_common/assets/fonts/generalsansbold.ttf
          weight: 700

    - family: Inter
      fonts:
        - asset: packages/flutter_common/assets/fonts/interthin.ttf
          weight: 100
        - asset: packages/flutter_common/assets/fonts/interextralight.ttf
          weight: 200
        - asset: packages/flutter_common/assets/fonts/interlight.ttf
          weight: 300
        - asset: packages/flutter_common/assets/fonts/interregular.ttf
          weight: 400
        - asset: packages/flutter_common/assets/fonts/intermedium.ttf
          weight: 500
        - asset: packages/flutter_common/assets/fonts/intersemibold.ttf
          weight: 600
        - asset: packages/flutter_common/assets/fonts/interbold.ttf
          weight: 700
        - asset: packages/flutter_common/assets/fonts/interextrabold.ttf
          weight: 800
        - asset: packages/flutter_common/assets/fonts/interblack.ttf
          weight: 900

flutter_gen:
  assets:
    outputs:
      package_parameter_enabled: false
  integrations:
    lottie: true

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: uppi-motorista
  org: uppi-brasil
dependency_overrides:
  analyzer: 6.4.1
  test_api: any
  dart_style: 2.3.6
  build_resolvers: 2.4.2
  build_runner: 2.4.13
  freezed: 2.4.5
  flutter_gen_core: 5.8.0
  flutter_gen_runner: 5.8.0
  flutter_gen: 5.8.0

