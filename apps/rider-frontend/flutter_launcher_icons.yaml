flutter_launcher_icons:
  # Logo oficial Uppi — ícone "Ui" azul+laranja com fundo branco arredondado
  # Item 57: Ícone comercial definitivo aplicado em todas as plataformas
  image_path: "assets/images/logo.png"

  android: true
  min_sdk_android: 21
  # Android adaptive icon (API 26+): fundo branco + ícone colorido sobre ele
  # Isso garante que o ícone se adapte ao formato de cada launcher (círculo, quadrado, squircle)
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  adaptive_icon_monochrome: "assets/images/logo.png"

  ios: true
  # iOS não usa adaptive icons — usa PNG 1024x1024 direto
  # remove_alpha_ios: true garante que não haja canal alpha (exigência da App Store)
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"

  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#096EFF"
    theme_color: "#096EFF"

  macos:
    generate: false
