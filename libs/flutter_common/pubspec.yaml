name: flutter_common
description: A new Flutter package project.
version: 0.0.1
publish_to: "none"

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: "^3.27.0"

dependencies:
  dartz: ^0.10.1
  flutter:
    sdk: flutter
  freezed_annotation: ^2.4.1
  intl: any
  ionicons: ^0.2.2
  latlong2: ^0.9.1
  generic_map:
    path: ../generic_map
  flutter_localizations:
    sdk: flutter
  cached_network_image: ^3.3.0
  json_annotation: ^4.8.1
  dotted_border: ^2.1.0
  image_picker: ^1.1.2
  collection: ^1.17.2
  pinput: ^5.0.0
  flutter_dotenv: ^5.2.1
  auto_route: any # Navigator's pop function is not working properly with auto_route navigation
  share_plus: ^10.0.0
  supabase_flutter: ^2.12.4
  hive_flutter: ^1.1.0
  url_launcher: ^6.3.2
  flutter_bloc: ^8.1.5
  hydrated_bloc: ^9.1.5
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.1.0
  flutter_tts: ^4.2.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  flutter_lints: ^5.0.0
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  flutter_gen_runner: ^5.3.2
  flutter_gen: ^5.3.2

# dependency_overrides:
#   geolocator: ^12.0.0
#   flutter_map: ^7.0.0

flutter:
  generate: true

  assets:
    - lib/assets/avatars/
    - lib/assets/countries/
    - lib/assets/images/
    - lib/assets/fonts/generalsansbold.ttf
    - lib/assets/fonts/generalsansextralight.ttf
    - lib/assets/fonts/generalsanslight.ttf
    - lib/assets/fonts/generalsansmedium.ttf
    - lib/assets/fonts/generalsansregular.ttf
    - lib/assets/fonts/generalsanssemibold.ttf
    - lib/assets/fonts/interblack.ttf
    - lib/assets/fonts/interbold.ttf
    - lib/assets/fonts/interextrabold.ttf
    - lib/assets/fonts/interextralight.ttf
    - lib/assets/fonts/interlight.ttf
    - lib/assets/fonts/intermedium.ttf
    - lib/assets/fonts/interregular.ttf
    - lib/assets/fonts/intersemibold.ttf
    - lib/assets/fonts/interthin.ttf

flutter_gen:
  assets:
    outputs:
      package_parameter_enabled: true
  integrations:
    lottie: true
